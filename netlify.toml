# Netlify config for BFO2026 site
# Static deployment（ビルドなし）

[build]
  publish = "."
  # ビルドコマンドなし（静的サイトをそのまま配信）

# /bfo77 → bfo77.html のクリーンURLルーティング
[[redirects]]
  from = "/bfo77"
  to = "/bfo77.html"
  status = 200

# 法務関連ページのクリーンURL
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/guidelines"
  to = "/guidelines.html"
  status = 200

# .jsx を text/javascript として配信（Babel が読みやすく）
# max-age=0 + must-revalidate: デプロイのたびにブラウザが必ずサーバーへ再確認する
# → 旧バージョンのキャッシュで空白ページになる問題を防止
[[headers]]
  for = "/src/*.jsx"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# 静的アセットは長期キャッシュ
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML はキャッシュさせない（更新を即反映）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# robots.txt — 短時間キャッシュ + 正しい MIME
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# sitemap.xml — 短時間キャッシュ + XML MIME
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
